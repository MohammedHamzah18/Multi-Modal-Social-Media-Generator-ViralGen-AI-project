services:
  - type: web
    name: voiceops-sentinel-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voiceops-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: ENABLE_PYANNOTE
        value: "false"
    healthCheckPath: /health

databases:
  - name: voiceops-db
    plan: starter
    databaseName: voiceops_sentinel
    user: voiceops
